<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <filter id="blur-filter">
      <feGaussianBlur stdDeviation="15" />
    </filter>
  </defs>
  
  <!-- Dark slate base background -->
  <rect width="180" height="180" rx="36" fill="#020617" />
  
  <!-- Subtle glowing circle behind -->
  <circle cx="90" cy="90" r="50" fill="url(#logo-grad)" opacity="0.15" filter="url(#blur-filter)" />
  
  <!-- Hexagonal border -->
  <path d="M 90 35 L 138 62.5 L 138 117.5 L 90 145 L 42 117.5 L 42 62.5 Z" 
        stroke="url(#logo-grad)" stroke-width="4" stroke-linejoin="round" fill="#090d16" />
        
  <!-- Sleek geometric letter 'K' -->
  <path d="M 72 60 V 120" stroke="url(#logo-grad)" stroke-width="6" stroke-linecap="round" />
  <path d="M 108 60 L 75 90 L 108 120" stroke="url(#logo-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
</svg>